name: 'MCP Logger'
description: 'GitHub Action for MCP server observability — instrument your MCP server with structured logging, distributed traces, and error diagnostics directly in your CI/CD pipelines. Catch failures before your users do.'
author: 'Solvo'
branding:
  icon: 'activity'
  color: 'red'
categories:
  - 'Developer Tools'
  - 'Monitoring'
  - 'Continuous Integration'
  - 'DevOps'
tags:
  - 'mcp'
  - 'observability'
  - 'logging'
  - 'tracing'
  - 'mcp-server'
  - 'devops'
  - 'instrumentation'
  - 'github-action'
inputs:
  server-id:
    description: 'Unique identifier for this MCP server'
    required: true
  endpoint:
    description: 'MCP Logger backend endpoint'
    required: false
    default: 'https://mcp-logger-backend.vercel.app'
runs:
  using: 'node20'
  main: 'dist/index.js'